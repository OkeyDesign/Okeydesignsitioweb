<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test - Sistema de Contacto Okey!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Mulish', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #16273F 0%, #2a4066 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #16273F;
      margin-bottom: 8px;
      font-size: 28px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #16273F;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #16273F;
    }
    textarea {
      resize: vertical;
      min-height: 120px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #16273F;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 24px;
    }
    button:hover:not(:disabled) {
      background: #0f1a2d;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(22, 39, 63, 0.3);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status {
      margin-top: 20px;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    .status.loading {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }
    .config-info {
      background: #fff3cd;
      border: 1px solid #ffeaa7;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #856404;
    }
    .config-info strong {
      color: #16273F;
    }
    .test-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .test-btn {
      padding: 10px;
      background: #f5f5f5;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0;
    }
    .test-btn:hover {
      background: #e5e5e5;
      transform: none;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Test de Contacto Okey!</h1>
    <p class="subtitle">Prueba el sistema de envío de emails con Resend</p>

    <div class="config-info">
      <strong>✅ Configuración:</strong><br>
      • Dominio: <code>okey.design</code> (verificado)<br>
      • Email de envío: <code>hola@okey.design</code><br>
      • Email de recepción: <code>hola@okey.design</code><br>
      • Endpoint: <code>/make-server-4cb2c9d0/contact/send</code>
    </div>

    <div class="test-buttons">
      <button class="test-btn" onclick="fillTestData('basic')">📝 Datos de prueba básicos</button>
      <button class="test-btn" onclick="fillTestData('complete')">📋 Datos completos</button>
      <button class="test-btn" onclick="fillTestData('quote')">💼 Cotización de proyecto</button>
      <button class="test-btn" onclick="clearForm()">🗑️ Limpiar formulario</button>
    </div>

    <form id="contactForm">
      <div class="form-group">
        <label for="name">Nombre *</label>
        <input type="text" id="name" required placeholder="Tu nombre completo">
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" required placeholder="tu@email.com">
      </div>

      <div class="form-group">
        <label for="company">Empresa / Proyecto</label>
        <input type="text" id="company" placeholder="Nombre de tu empresa o proyecto">
      </div>

      <div class="form-group">
        <label for="phone">Teléfono</label>
        <input type="tel" id="phone" placeholder="+56 9 1234 5678">
      </div>

      <div class="form-group">
        <label for="service">Servicio</label>
        <select id="service">
          <option value="">Selecciona un servicio</option>
          <option value="UX/UI Design">UX/UI Design</option>
          <option value="Branding">Branding</option>
          <option value="Maker 3D">Maker 3D</option>
          <option value="Consultoría">Consultoría</option>
          <option value="Cotización de proyecto">Cotización de proyecto</option>
          <option value="Otro">Otro</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">Mensaje *</label>
        <textarea id="message" required placeholder="Cuéntanos qué necesitas..."></textarea>
      </div>

      <button type="submit" id="submitBtn">
        🚀 Enviar mensaje de prueba
      </button>
    </form>

    <div id="status" class="status"></div>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const statusDiv = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    // Función para llenar datos de prueba
    function fillTestData(type) {
      clearForm();
      
      if (type === 'basic') {
        document.getElementById('name').value = 'Juan Pérez';
        document.getElementById('email').value = 'juan.perez@test.com';
        document.getElementById('message').value = 'Este es un mensaje de prueba del sistema de contacto.';
      } 
      else if (type === 'complete') {
        document.getElementById('name').value = 'María González';
        document.getElementById('email').value = 'maria.gonzalez@empresa.cl';
        document.getElementById('company').value = 'Empresa Tech SpA';
        document.getElementById('phone').value = '+56 9 8765 4321';
        document.getElementById('service').value = 'UX/UI Design';
        document.getElementById('message').value = 'Necesitamos rediseñar nuestra aplicación móvil. Actualmente tenemos 50.000 usuarios activos y queremos mejorar la experiencia de usuario. ¿Pueden ayudarnos?';
      }
      else if (type === 'quote') {
        document.getElementById('name').value = 'Carlos Ramírez';
        document.getElementById('email').value = 'carlos@startup.com';
        document.getElementById('company').value = 'Startup Innovadora';
        document.getElementById('phone').value = '+56 9 1111 2222';
        document.getElementById('service').value = 'Cotización de proyecto';
        document.getElementById('message').value = 'Queremos desarrollar una plataforma web completa con diseño UX/UI, branding e identidad visual. El proyecto es urgente, necesitamos lanzar en 2 meses. Presupuesto: $5.000.000 CLP.';
      }
    }

    function clearForm() {
      form.reset();
      statusDiv.className = 'status';
      statusDiv.textContent = '';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        company: document.getElementById('company').value,
        phone: document.getElementById('phone').value,
        service: document.getElementById('service').value,
        message: document.getElementById('message').value,
      };

      // Mostrar estado de carga
      statusDiv.className = 'status loading';
      statusDiv.innerHTML = '⏳ Enviando mensaje...';
      submitBtn.disabled = true;
      submitBtn.textContent = '⏳ Enviando...';

      try {
        const response = await fetch(
          'https://wauetomehphbvceupyjj.supabase.co/functions/v1/make-server-4cb2c9d0/contact/send',
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndhdWV0b21laHBoYnZjZXVweWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQ0NTc0NjUsImV4cCI6MjA1MDAzMzQ2NX0.8z_WHMLTHtx5ZKqq0TXLgRqm5LHMjYQ3NRlnbg77Z3I',
            },
            body: JSON.stringify(formData),
          }
        );

        const result = await response.json();

        if (!response.ok || !result.ok) {
          throw new Error(result.error || 'Error al enviar el mensaje');
        }

        // Éxito
        statusDiv.className = 'status success';
        statusDiv.innerHTML = `
          ✅ <strong>¡Mensaje enviado exitosamente!</strong><br>
          • ID del mensaje: <code>${result.messageId}</code><br>
          • Revisa tu bandeja de entrada en <strong>hola@okey.design</strong><br>
          • Si no lo ves, revisa la carpeta de spam
        `;
        
        // Limpiar formulario después de 3 segundos
        setTimeout(() => {
          clearForm();
        }, 5000);

      } catch (error) {
        // Error
        statusDiv.className = 'status error';
        statusDiv.innerHTML = `
          ❌ <strong>Error al enviar:</strong><br>
          ${error.message}<br><br>
          <strong>Posibles causas:</strong><br>
          • API key no configurada o inválida<br>
          • Dominio no verificado en Resend<br>
          • Error de conexión al servidor<br>
          • Revisa la consola del navegador para más detalles
        `;
        console.error('Error completo:', error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '🚀 Enviar mensaje de prueba';
      }
    });

    // Log inicial
    console.log('🧪 Test de contacto Okey! cargado');
    console.log('📧 Configuración:');
    console.log('  - Endpoint:', 'https://wauetomehphbvceupyjj.supabase.co/functions/v1/make-server-4cb2c9d0/contact/send');
    console.log('  - From:', 'hola@okey.design');
    console.log('  - To:', 'hola@okey.design');
  </script>
</body>
</html>
